<svg xmlns="http://www.w3.org/2000/svg" width="390" height="760" viewBox="0 0 390 760" role="img" aria-labelledby="title desc">
  <title id="title">Taniti home mobile wireframe</title>
  <desc id="desc">Mobile frame with logo, menu button, stacked hero, vertical planning steps, and stacked cards.</desc>
  <rect width="390" height="760" fill="#f5f5f5"/>
  <rect x="12" y="12" width="366" height="52" fill="#fff" stroke="#333" stroke-width="2"/>
  <rect x="24" y="28" width="100" height="18" fill="#ccc"/>
  <rect x="280" y="24" width="80" height="28" fill="#999"/>
  <text x="24" y="86" font-family="Arial" font-size="11" fill="#333">Logo + Menu (hamburger opens nav)</text>

  <rect x="12" y="100" width="366" height="160" fill="#fff" stroke="#333" stroke-width="2"/>
  <rect x="28" y="124" width="220" height="22" fill="#bbb"/>
  <rect x="28" y="158" width="300" height="10" fill="#ddd"/>
  <rect x="28" y="176" width="260" height="10" fill="#ddd"/>
  <rect x="28" y="204" width="130" height="28" fill="#888"/>
  <rect x="170" y="204" width="130" height="28" fill="#ccc" stroke="#666"/>

  <rect x="12" y="280" width="366" height="70" fill="#fff" stroke="#333" stroke-dasharray="4 3"/>
  <rect x="12" y="360" width="366" height="70" fill="#fff" stroke="#333" stroke-dasharray="4 3"/>
  <rect x="12" y="440" width="366" height="70" fill="#fff" stroke="#333" stroke-dasharray="4 3"/>
  <rect x="12" y="520" width="366" height="70" fill="#fff" stroke="#333" stroke-dasharray="4 3"/>
  <text x="28" y="320" font-family="Arial" font-size="12" fill="#333">1 Choose lodging</text>
  <text x="28" y="400" font-family="Arial" font-size="12" fill="#333">2 Pick activities</text>
  <text x="28" y="480" font-family="Arial" font-size="12" fill="#333">3 Plan transport</text>
  <text x="28" y="560" font-family="Arial" font-size="12" fill="#333">4 Request booking</text>

  <rect x="12" y="610" width="366" height="120" fill="#fff" stroke="#333"/>
  <text x="28" y="670" font-family="Arial" font-size="12" fill="#555">Highlight card (stacked on mobile)</text>
</svg>
